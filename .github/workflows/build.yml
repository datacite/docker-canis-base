name: Build

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build slim base (no push on PRs — only verification)
      - name: Build slim base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: canis-base:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build tools variant on top of the just-built base (no push on PRs)
      - name: Build tools variant
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.tools
          platforms: linux/amd64
          push: false
          build-args: |
            BASE_IMAGE=canis-base:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max
